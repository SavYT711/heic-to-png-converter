name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole convert.py

      - name: Prepare release file
        run: |
          mkdir release
          copy dist\convert.exe release\convert.exe

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path release\* -DestinationPath heic-to-png.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: heic-to-png.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}